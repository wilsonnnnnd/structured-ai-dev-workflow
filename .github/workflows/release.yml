name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build package
        run: |
          npm run build --if-present

      - name: Run tests
        run: |
          npm test --if-present

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check npm package version
        id: npm_check
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet."
          fi

      - name: Publish to npm with OIDC
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.npm_check.outputs.published == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.npm_check.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.npm_check.outputs.package_version }}
          name: v${{ steps.npm_check.outputs.package_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}